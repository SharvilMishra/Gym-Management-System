<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GMS - Gym Management System</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loginScreen">
  <div class="login-orb orb-1"></div>
  <div class="login-orb orb-2"></div>
  <div class="login-orb orb-3"></div>
  <div class="login-card">
    <div class="login-logo"><i class="fas fa-dumbbell"></i></div>
    <h1>Gym Management</h1>
    <p class="login-sub">Sign in to your account</p>
    <form id="loginForm">
      <div class="fg"><label>Email</label><div class="iw"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Enter your email" required></div></div>
      <div class="fg"><label>Password</label><div class="iw"><i class="fas fa-lock"></i><input type="password" id="loginPass" placeholder="Enter your password" required></div></div>
      <button type="submit" class="btn btn-p btn-full">Sign In</button>
    </form>
    <div class="demo-box">
      <p><strong>Demo Credentials</strong></p>
      <p>Admin: admin@gms.com / admin123</p>
      <p>Trainer: trainer@gms.com / trainer123</p>
      <p>Member: member@gms.com / member123</p>
    </div>
  </div>
</div>
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sb-brand"><i class="fas fa-dumbbell"></i><span>GMS</span></div>
    <nav id="sbNav">
      <a href="#" data-page="dashboard" class="active"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
      <a href="#" data-page="members" data-roles="admin,trainer"><i class="fas fa-users"></i><span>Members</span></a>
      <a href="#" data-page="attendance" data-roles="admin,trainer"><i class="fas fa-clipboard-check"></i><span>Attendance</span></a>
      <a href="#" data-page="payments" data-roles="admin"><i class="fas fa-credit-card"></i><span>Payments</span></a>
      <a href="#" data-page="settings"><i class="fas fa-cog"></i><span>Settings</span></a>
    </nav>
    <div class="sb-footer">
      <button id="themeBtn" class="theme-btn"><i class="fas fa-moon"></i><span>Dark Mode</span></button>
      <div class="sb-user">
        <div class="avatar" id="sbAvatar">A</div>
        <div class="uinfo"><span id="sbName">Admin</span><small id="sbRole">Administrator</small></div>
        <button id="logoutBtn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </aside>
  <div class="sb-overlay" id="sbOverlay"></div>
  <main id="main">
    <header id="topbar">
      <button id="menuBtn" class="menu-btn"><i class="fas fa-bars"></i></button>
      <h2 id="pageTitle">Dashboard</h2>
      <div class="tb-right"><span id="tbDate"></span></div>
    </header>
    <div id="pageContent"></div>
  </main>
</div>
<div id="modalOverlay" class="hidden"><div id="modalBox"><button id="modalClose" class="m-close">&times;</button><div id="modalBody"></div></div></div>
<div id="toastBox"></div>
<script src="app.js"></script>
</body>
</html>
